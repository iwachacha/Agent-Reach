name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e .[dev]

      - name: Run tests
        run: |
          pytest -q

  crawl4ai-optional:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and crawl4ai deps
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e .[dev,crawl4ai]

      - name: Install browser runtime
        run: |
          python -m playwright install --with-deps chromium

      - name: Validate crawl4ai optional surface
        run: |
          python -c "from crawl4ai.__version__ import __version__; print(__version__)"
          pytest -q tests/test_collect_adapters.py -k crawl4ai
