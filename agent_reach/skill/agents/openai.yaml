interface:
  display_name: "Agent Reach"
  short_description: "Windows research collection and diagnostics across web, search, developer, social, forum, registry, video, RSS, and optional browser-backed channels"
  default_prompt: "Use Agent Reach to discover the live channel contract, check core/advisory readiness, inspect probe attention, validate evidence ledgers, and run thin read-only collection across Exa, Jina Reader, GitHub CLI, Hatena Bookmark, Bluesky, Qiita, yt-dlp, RSS feeds, SearXNG, Crawl4AI, Hacker News, MCP Registry, Reddit through rdt-cli, and optional Twitter/X tooling. Agent Reach does not choose scope; the calling workflow chooses channels and scale for the task. Keep lightweight asks on collect by default, treat batch and scout as explicit opt-in helpers, and keep ranking, summarization, scheduling, media analysis, and publishing outside Agent Reach."
